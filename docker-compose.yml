version: '3.8'

services:
  fraud-engine-api:
    build: .          
    ports:
      - "8000:8000"   
    volumes:
      - .:/app
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password123
    depends_on:
      - neo4j  
  
  neo4j:
    image: neo4j:5.12
    ports:
      - "7474:7474" #visual dashboard
      - "7687:7687" #bolt
    environment:
      - NEO4J_AUTH=neo4j/password123
    volumes:
      - neo4j_data:/data

volumes:
  neo4j_data:        