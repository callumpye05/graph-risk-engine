version: '3.8'

services:
  fraud-engine-api:
    build: .          
    ports:
      - "8000:8000"   
    volumes:
      - .:/app
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password123
    depends_on:
      - neo4j  
  
  neo4j:
    image: neo4j:5.12
    ports:
      - "7474:7474" #visual dashboard
      - "7687:7687" #bolt
    environment:
      - NEO4J_AUTH=neo4j/password123
    volumes:
      - neo4j_data:/data
  kafka:
    image: bitnamilegacy/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      
      
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:29092,CONTROLLER://:9093,EXTERNAL://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
  worker:
    build: .
    container_name: risk_worker
    command: python worker.py
    depends_on:
      - kafka
      - neo4j
  redis:
    image: redis:latest
    container_name: fraud-redis
    ports:
      - "6379:6379"
  
  optimizer:
    image: julia:1.9
    container_name: fraud-optimizer
    volumes:
      - .:/app  
    working_dir: /app
    environment:
      - REDIS_HOST=redis
    tty: true 
    depends_on:
      - redis

volumes:
  neo4j_data:        